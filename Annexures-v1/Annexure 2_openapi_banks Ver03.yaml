openapi: 3.0.1
info:
  title: RTSIS API - BANKS
  description: This is an official RTSIS API for Commercial Banks
  contact:
    name: BOT- Supervisory Data Tech.
    email: suptech@bot.go.tz
  license:
    name: License, BOT-2022
  version: 1.0.6
servers:
  - url: https://suptech-wso2-dev.bot.go.tz:8245
    description: RTSIS UAT SERVER
paths:
  /liabilities/digitalSaving:
    get:
      tags:
      - Liabilities
      summary: Retrieve digital saving product details
      description: The HTTP request GET /liabilities/digitalSaving used to retrieve digital saving product details
      operationId: digitalSavingGet
      parameters:
        - in: header
          name: Authentication
          description: >-
            Header for authentication key ex: Token value
          schema:
            type: string
          required: true
        - in: header
          name: informationId
          description: >-
            Header for information identification which have already submitted to RTSIS ex: 3fe6d84ac82f43a26deffd6ab2cbde1853316f12e670db9f0ca3f07a23641b01
          schema:
            type: string
        - in: header
          name: sender
          description: >-
            Header for sender or institution code or a registration identification of an institute ex: ABC0000001
          schema:
            type: string
          required: true
        - in: header
          name: customerIdentificationNumber
          description: >-
            Header for customer identification number ex: 10203040
          schema:
            type: string
        - in: header
          name: fromDate
          description: >-
            Header for checking date range (from a specific date) ex: 20220415
          schema:
            type: string
        - in: header
          name: toDate
          description: >-
            Header for checking date range (to a specific date) ex: 20220415
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/digitalSavingInformation'
        '400':
          description: >-
            Bad Request - The application cannot process the request; for
            example, due to malformed syntax or the payload exceeded size
            restrictions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorInformationResponse'
        '405':
          description: >-
            Method Not Allowed - An unsupported HTTP method for the request was
            used.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorInformationResponse'
        '501':
          description: >-
            Not Implemented - The server does not support the requested service.
            The client should not retry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorInformationResponse'
        '503':
          description: >-
            Service Unavailable - The server is currently unavailable to accept
            any new service requests. This should be a temporary state, and the
            client should retry within a reasonable time frame.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorInformationResponse'
    post:
      tags:
      - Liabilities
      summary: Register digital saving product details
      description: The HTTP request POST /liabilities/digitalSaving is used to register digital saving product details
      operationId: digitalSavingPost
      parameters:
        - in: header
          name: Authentication
          description: >-
            Header for authentication key ex: Token value
          schema:
            type: string
          required: true
        - in: header
          name: informationId
          description: >-
            Header for information identification which have already submitted to RTSIS ex: 3fe6d84ac82f43a26deffd6ab2cbde1853316f12e670db9f0ca3f07a23641b01
          schema:
            type: string
        - in: header
          name: fspInformationId
          description: >-
            Header for information identification from the FSP, which will be used as end-to-end id. ex: c82f43a26deffd6ab2cbde1853316f
          schema:
            type: string
          required: true
        - in: header
          name: sender
          description: >-
            Header for sender or institution code or a registration identification of an institute ex: ABC0000001
          schema:
            type: string
          required: true
      requestBody:
        description: Payload for register a new digital saving product details
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/digitalSavingInformation'
        required: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/rtsisInformationResponse'
        '400':
          description: >-
            Bad Request - The application cannot process the request; for
            example, due to malformed syntax or the payload exceeded size
            restrictions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorInformationResponse'
        '405':
          description: >-
            Method Not Allowed - An unsupported HTTP method for the request was
            used.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorInformationResponse'
        '501':
          description: >-
            Not Implemented - The server does not support the requested service.
            The client should not retry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorInformationResponse'
        '503':
          description: >-
            Service Unavailable - The server is currently unavailable to accept
            any new service requests. This should be a temporary state, and the
            client should retry within a reasonable time frame.
          content:
            application/json:
